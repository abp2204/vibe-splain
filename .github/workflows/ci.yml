name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Verify CLI entry point
        run: node packages/cli/dist/index.js --help

      - name: Verify install command
        run: node packages/cli/dist/index.js install || true

      - name: Verify UI bundle exists
        run: test -f packages/cli/dist/ui/index.html

      - name: Verify no console.log in source
        run: |
          ! grep -rn "console\.log(" packages/brain/src/ packages/cli/src/ \
            | grep -v "^.*//.*console\.log" \
            | grep -v "^.*\*.*console\.log"
